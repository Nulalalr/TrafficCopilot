web:
  host: 127.0.0.1
  port: 5000
  debug: false
  metrics_path: experiments/mobilenetv3_albu_weather/metrics.json
  eval_cache_ttl_sec: 600

data:
  dataset_root: demo/traffic gestures.v1i.multiclass

thresholds:
  confidence: 0.5
  margin: 0.08

system:
  dataset:
    target: core.plugins.roboflow_dataset:RoboflowDataset
    params: {}

  predictor:
    target: core.plugins.pytorch_classifier:PyTorchMobileNetV3Classifier
    params:
      checkpoint_path: experiments/mobilenetv3_albu_weather/best_model_quantized.pth
      config_path: experiments/mobilenetv3_albu_weather/config.yaml
      device: auto
      model_name: MobileNetV3 + Weather Aug

  pose_overlay:
    target: core.plugins.mediapipe_pose_overlay:MediaPipePoseOverlay
    params:
      model_path: weights/pose_landmarker_lite.task

  intent_engine:
    target: core.plugins.temporal_intent:TemporalIntentEngine
    params:
      window_size: 5
      activation_count: 3
      hold_frames: 2
      label_to_command:
        change lanes: CHANGE_LANES
        go straight: GO_STRAIGHT
        pull over: PULL_OVER
        slow down: SLOW_DOWN
        stop: STOP
        turn left: TURN_LEFT
        turn right: TURN_RIGHT
        wait for  left turn: WAIT_LEFT_TURN
      command_descriptions:
        CHANGE_LANES: Suggest lane change
        GO_STRAIGHT: Allow going straight
        PULL_OVER: Pull over to roadside
        SLOW_DOWN: Slow down and observe
        STOP: Stop immediately
        TURN_LEFT: Allow left turn
        TURN_RIGHT: Allow right turn
        WAIT_LEFT_TURN: Wait for left turn
        UNKNOWN: Confidence too low, degrade to safe state
