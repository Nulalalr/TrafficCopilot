model:
  pretrained: true
  hidden_dim: 256
  num_layers: 1
  dropout: 0.2
  freeze_backbone: false

data:
  dataset_root: "data/raw/police_gesture_v1"
  image_size: 224
  clip_len: 16
  train_stride: 8
  eval_stride: 16
  include_background: false

train:
  run_name: video_mobilenetv3_gru
  output_root: experiments
  device: auto
  seed: 42
  epochs: 10
  batch_size: 4
  num_workers: 0
  pin_memory: false
  lr: 0.0003
  min_lr: 0.000001
  weight_decay: 0.0001
  use_class_weights: true
