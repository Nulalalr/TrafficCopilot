video:
  camera_index: 0
  camera_backend: null
  camera_width: 1280
  camera_height: 720
  camera_fps: null
  sample_every: 1
  max_frames: null
  draw_overlay: true
  display: true
  window_name: "TrafficCopilot Camera"
  output_dir: outputs/camera_runs
  save_video: false
  save_jsonl: false

data:
  dataset_root: "data/video_frames_ctp_v1"

thresholds:
  confidence: 0.5
  margin: 0.08

system:
  dataset:
    target: core.plugins.roboflow_dataset:RoboflowDataset
    params: {}

  predictor:
    target: core.plugins.pose_sequence_classifier:PoseSequenceClassifier
    params:
      checkpoint_path: experiments/pose_gru_police_gesture_v1/best_model.pth
      config_path: experiments/pose_gru_police_gesture_v1/config.yaml
      device: auto
      model_name: Pose GRU (police_gesture_v1)
      model_path: weights/pose_landmarker_lite.task
      clip_len: 16

  intent_engine:
    target: core.plugins.temporal_intent:TemporalIntentEngine
    params:
      window_size: 5
      activation_count: 3
      hold_frames: 2
      label_to_command:
        Stop: STOP
        Forward: GO_STRAIGHT
        Left Turn: TURN_LEFT
        Left Turn Waiting: WAIT_LEFT_TURN
        Right Turn: TURN_RIGHT
        Lane Changing: CHANGE_LANES
        Slow Down: SLOW_DOWN
        Pull Over: PULL_OVER
      command_descriptions:
        CHANGE_LANES: Suggest lane change
        GO_STRAIGHT: Allow going straight
        PULL_OVER: Pull over to roadside
        SLOW_DOWN: Slow down and observe
        STOP: Stop immediately
        TURN_LEFT: Allow left turn
        TURN_RIGHT: Allow right turn
        WAIT_LEFT_TURN: Wait for left turn
        UNKNOWN: Confidence too low, degrade to safe state

  police_detector:
    target: core.plugins.full_frame_detector:FullFrameDetector
    params: {}

  tracker:
    target: core.plugins.single_iou_tracker:SingleIouTracker
    params:
      iou_threshold: 0.2
      max_lost: 15
      smooth: 0.65
