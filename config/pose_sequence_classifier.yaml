model:
  pose_dim: 132
  hidden_dim: 128
  num_layers: 1
  dropout: 0.2

data:
  dataset_root: "data/raw/police_gesture_v1"
  pose_root: "output/pose_sequences"
  clip_len: 16
  stride: 8
  include_background: false

train:
  run_name: pose_gru_police_gesture_v1
  output_root: experiments
  device: auto
  seed: 42
  epochs: 10
  batch_size: 16
  num_workers: 0
  pin_memory: false
  lr: 0.0006
  min_lr: 0.000001
  weight_decay: 0.0001
  use_class_weights: true

