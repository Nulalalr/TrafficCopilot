model:
  pose_dim: 132
  hidden_dim: 256
  num_layers: 2
  dropout: 0.3

data:
  dataset_root: "police_gesture_v1"
  pose_root: "output/pose_sequences"
  clip_len: 32
  stride: 8
  include_background: false

train:
  run_name: pose_gru_police_gesture_v1
  output_root: experiments
  device: auto
  seed: 42
  epochs: 50
  batch_size: 256
  num_workers: 16
  pin_memory: true
  lr: 0.0003
  min_lr: 0.000001
  weight_decay: 0.0001
  use_class_weights: true
