model:
  name: mobilenet_v3_small
  pretrained: true
  dropout: 0.2

data:
  dataset_root: "police_gesture_v1_frames"
  image_size: 224

augment:
  backend: torchvision
  horizontal_flip: 0.5
  shift_limit: 0.04
  scale_limit: 0.08
  rotate_limit: 8
  shift_scale_rotate_p: 0.5
  brightness_limit: 0.2
  contrast_limit: 0.2
  brightness_contrast_p: 0.5
  hue_shift_limit: 8
  sat_shift_limit: 12
  val_shift_limit: 10
  hsv_p: 0.3
  weather_p: 0.35
  degrade_p: 0.3
  coarse_dropout_p: 0.25

train:
  run_name: mobilenetv3_baseline
  output_root: experiments
  device: auto
  seed: 42
  epochs: 30
  batch_size: 128
  num_workers: 16
  pin_memory: true
  lr: 0.0003
  min_lr: 0.000001
  weight_decay: 0.0001
  use_class_weights: true
