video:
  input_path: ""
  output_dir: outputs/video_runs
  sample_every: 1
  max_frames: null
  draw_overlay: true
  save_video: true
  save_jsonl: true

web:
  host: 127.0.0.1
  port: 5000
  debug: false
  metrics_path: experiments/mobilenetv3_video_frames/metrics.json
  eval_cache_ttl_sec: 600

data:
  dataset_root: "data/video_frames_ctp_v1"

thresholds:
  confidence: 0.5
  margin: 0.08

system:
  dataset:
    target: core.plugins.roboflow_dataset:RoboflowDataset
    params: {}

  predictor:
    target: core.plugins.pytorch_classifier:PyTorchMobileNetV3Classifier
    params:
      checkpoint_path: experiments/mobilenetv3_video_frames/best_model.pth
      config_path: experiments/mobilenetv3_video_frames/config.yaml
      device: auto
      model_name: MobileNetV3 Video Frames

  pose_overlay:
    target: core.plugins.mediapipe_pose_overlay:MediaPipePoseOverlay
    params:
      model_path: weights/pose_landmarker_lite.task

  intent_engine:
    target: core.plugins.temporal_intent:TemporalIntentEngine
    params:
      window_size: 5
      activation_count: 3
      hold_frames: 2
      label_to_command:
        Stop: STOP
        Forward: GO_STRAIGHT
        Left Turn: TURN_LEFT
        Left Turn Waiting: WAIT_LEFT_TURN
        Right Turn: TURN_RIGHT
        Lane Changing: CHANGE_LANES
        Slow Down: SLOW_DOWN
        Pull Over: PULL_OVER
      command_descriptions:
        CHANGE_LANES: Suggest lane change
        GO_STRAIGHT: Allow going straight
        PULL_OVER: Pull over to roadside
        SLOW_DOWN: Slow down and observe
        STOP: Stop immediately
        TURN_LEFT: Allow left turn
        TURN_RIGHT: Allow right turn
        WAIT_LEFT_TURN: Wait for left turn
        UNKNOWN: Confidence too low, degrade to safe state

  police_detector:
    target: core.plugins.full_frame_detector:FullFrameDetector
    params: {}

  tracker:
    target: core.plugins.single_iou_tracker:SingleIouTracker
    params:
      iou_threshold: 0.2
      max_lost: 15
      smooth: 0.65
