model:
  name: mobilenet_v3_pose_fusion
  pretrained: true
  dropout: 0.2
  pose_hidden_dim: 64
  fusion_hidden_dim: 128
  pose_dropout: 0.1

data:
  dataset_root: demo/traffic gestures.v1i.multiclass
  pose_root: output/pose_keypoints
  image_size: 224

augment:
  backend: torchvision
  horizontal_flip: 0.5
  shift_limit: 0.04
  scale_limit: 0.08
  rotate_limit: 8
  shift_scale_rotate_p: 0.5
  brightness_limit: 0.2
  contrast_limit: 0.2
  brightness_contrast_p: 0.5
  hue_shift_limit: 8
  sat_shift_limit: 12
  val_shift_limit: 10
  hsv_p: 0.3
  weather_p: 0.35
  degrade_p: 0.3
  coarse_dropout_p: 0.25

train:
  run_name: fusion_mobilenetv3_pose
  output_root: experiments
  device: auto
  seed: 42
  epochs: 20
  batch_size: 16
  num_workers: 0
  pin_memory: false
  lr: 0.0004
  min_lr: 0.000001
  weight_decay: 0.0001
  use_class_weights: true
