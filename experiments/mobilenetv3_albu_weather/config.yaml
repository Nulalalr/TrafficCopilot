model:
  name: mobilenet_v3_small
  pretrained: true
  dropout: 0.2

data:
  dataset_root: demo/traffic gestures.v1i.multiclass
  image_size: 224

augment:
  backend: albumentations
  horizontal_flip: 0.5
  shift_limit: 0.05
  scale_limit: 0.1
  rotate_limit: 10
  shift_scale_rotate_p: 0.65
  brightness_limit: 0.25
  contrast_limit: 0.25
  brightness_contrast_p: 0.55
  hue_shift_limit: 10
  sat_shift_limit: 15
  val_shift_limit: 15
  hsv_p: 0.35
  weather_p: 0.5
  degrade_p: 0.45
  coarse_dropout_p: 0.3

train:
  run_name: mobilenetv3_albu_weather
  output_root: experiments
  device: auto
  seed: 42
  epochs: 25
  batch_size: 16
  num_workers: 0
  pin_memory: false
  lr: 0.0005
  min_lr: 0.000001
  weight_decay: 0.0001
  use_class_weights: true
