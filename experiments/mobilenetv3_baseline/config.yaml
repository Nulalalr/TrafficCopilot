model:
  name: mobilenet_v3_small
  pretrained: true
  dropout: 0.2

data:
  dataset_root: "data/raw/traffic gestures.v1i.multiclass"
  image_size: 224

train:
  run_name: mobilenetv3_baseline
  output_root: experiments
  device: auto
  seed: 42
  epochs: 20
  batch_size: 16
  num_workers: 0
  pin_memory: false
  lr: 0.0005
  min_lr: 0.000001
  weight_decay: 0.0001
  use_class_weights: true
